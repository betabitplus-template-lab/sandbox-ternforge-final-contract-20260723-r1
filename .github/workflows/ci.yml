name: ci

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  required:
    name: required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.1
        with:
          persist-credentials: false
      - name: Validate release state
        run: |
          set -euo pipefail
          test -s version.txt
          test "$(jq -r '.["."]' .release-please-manifest.json)" = "$(cat version.txt)"
